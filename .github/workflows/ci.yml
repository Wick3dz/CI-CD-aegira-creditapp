name: CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build Images

    runs-on:
      - self-hosted
      - aegira-creditapp-runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build \
          -t dhimasbagus/aegira-credit-app:latest \
          ./aegira-loan-service

      - name: Build Frontend Image
        run: |
          docker build \
          -t dhimasbagus/creditappdemo:latest \
          ./creditappdemo

  push:
    name: Push Images to Docker Hub

    needs: build

    runs-on:
      - self-hosted
      - aegira-creditapp-runner

    steps:
      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          -u "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      - name: Push Backend Image
        run: |
          docker push dhimasbagus/aegira-credit-app:latest

      - name: Push Frontend Image
        run: |
          docker push dhimasbagus/creditappdemo:latest

  deploy:
    name: Deploy Application

    needs: push

    runs-on:
      - self-hosted
      - aegira-creditapp-runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Pull Latest Images
        run: |
          docker compose pull

      - name: Deploy Application
        run: |
          docker compose up -d

      - name: Show Running Containers
        run: |
          docker compose ps

      - name: Show Docker Containers
        run: |
          docker ps

      - name: Backend Logs
        if: failure()
        run: docker compose logs aegira

      - name: Frontend Logs
        if: failure()
        run: docker compose logs creditapp